name: Fetch & Roast Tweets

on:
  # Manual trigger from GitHub UI
  workflow_dispatch:

  # Scheduled: 10:00 AM PST daily (UTC-8 = 18:00 UTC)
  schedule:
    - cron: '0 18 * * *'

jobs:
  fetch-and-roast:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Sync posts from X
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          NEXT_PUBLIC_BASE_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL }}
          X_API_DAILY_BUDGET: ${{ secrets.X_API_DAILY_BUDGET }}
          OPENAI_DAILY_BUDGET: ${{ secrets.OPENAI_DAILY_BUDGET }}
        run: npx tsx scripts/sync-now.ts

      - name: Generate roasts for new posts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          NEXT_PUBLIC_BASE_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL }}
          OPENAI_DAILY_BUDGET: ${{ secrets.OPENAI_DAILY_BUDGET }}
        run: npx tsx scripts/generate-roasts-now.ts
